<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Listing</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../assets/js/theme.js"></script>
    <link rel="stylesheet" href="../assets/css/theme.css" />
    <link rel="stylesheet" href="../assets/css/pages.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
  </head>
  <body class="font-body-md text-body-md">
    <header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 shadow-sm">
      <div class="max-w-container-max mx-auto px-margin-page flex items-center justify-between h-20">
        <a class="font-display-lg text-headline-md text-primary" href="./home.html">Curated Sanctuary</a>
        <div class="flex items-center gap-4">
          <a class="p-2 rounded-full hover:bg-surface-container-low transition-all active:scale-95" href="./sellerdashboard.html">
            <span class="material-symbols-outlined text-primary">dashboard</span>
          </a>
          <a class="p-2 rounded-full hover:bg-surface-container-low transition-all active:scale-95" href="./profile.html">
            <span class="material-symbols-outlined text-primary">account_circle</span>
          </a>
        </div>
      </div>
    </header>
    <main class="pt-32 pb-stack-lg max-w-4xl mx-auto px-margin-page">
      <header class="mb-stack-lg">
        <h1 class="font-headline-lg text-headline-lg text-on-background mb-2">List a New Treasure</h1>
        <p class="text-on-surface-variant font-body-md">Add a listing and include 0..n image URLs.</p>
      </header>
      <form class="space-y-stack-lg" onsubmit="return false;">
        <section class="bg-surface-container-lowest p-stack-md rounded-xl shadow-sm border border-outline-variant/20">
          <div class="flex items-center gap-3 mb-stack-md">
            <span class="material-symbols-outlined text-primary">auto_stories</span>
            <h2 class="font-headline-md text-headline-md">Book Particulars</h2>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
            <div class="flex flex-col gap-2">
              <label class="text-label-md text-on-surface-variant" for="book_id">Book ID</label>
              <input class="bg-surface-container-low border border-outline-variant/20 py-3 px-4 focus:ring-1 focus:ring-primary transition-all rounded-lg outline-none" id="book_id" placeholder="1" type="number" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-label-md text-on-surface-variant" for="condition">Condition</label>
              <input class="bg-surface-container-low border border-outline-variant/20 py-3 px-4 focus:ring-1 focus:ring-primary transition-all rounded-lg outline-none" id="condition" placeholder="Tốt" type="text" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-label-md text-on-surface-variant" for="price">Price</label>
              <input class="bg-surface-container-low border border-outline-variant/20 py-3 px-4 focus:ring-1 focus:ring-primary transition-all rounded-lg outline-none" id="price" placeholder="45000" type="number" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-label-md text-on-surface-variant" for="status">Status</label>
              <select class="bg-surface-container-low border border-outline-variant/20 py-3 px-4 focus:ring-1 focus:ring-primary transition-all rounded-lg outline-none" id="status">
                <option value="available">available</option>
                <option value="sold">sold</option>
              </select>
            </div>
          </div>
        </section>
        <section class="bg-surface-container-lowest p-stack-md rounded-xl shadow-sm border border-outline-variant/20">
          <div class="flex items-center gap-3 mb-stack-md">
            <span class="material-symbols-outlined text-primary">image</span>
            <h2 class="font-headline-md text-headline-md">Images</h2>
          </div>
          <p class="text-on-surface-variant text-body-md">Paste one URL per line (optional).</p>
          <textarea class="mt-4 w-full min-h-[180px] bg-surface-container-low border border-outline-variant/20 rounded-lg px-4 py-3 focus:ring-1 focus:ring-primary" id="images" placeholder="https://...\nhttps://..."></textarea>
        </section>
        <div class="flex gap-4">
          <button class="bg-primary text-on-primary px-8 py-4 rounded-lg font-label-md hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-xl shadow-primary/10" id="listing-submit" type="button">
            Create Listing <span class="material-symbols-outlined text-[20px]">add</span>
          </button>
          <a class="border border-primary text-primary px-8 py-4 rounded-lg font-label-md hover:bg-primary/5 transition-all flex items-center justify-center" href="./sellerdashboard.html">
            Cancel
          </a>
        </div>
        <div id="listing-status" style="display:none;"></div>
      </form>
    </main>
    <script type="module" src="../assets/js/pages/managelisting.js"></script>
  </body>
</html>
