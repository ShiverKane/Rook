<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../assets/js/theme.js"></script>
    <link rel="stylesheet" href="../assets/css/theme.css" />
    <link rel="stylesheet" href="../assets/css/pages.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
  </head>
  <body class="font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
    <header class="bg-surface/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-outline-variant/30 shadow-sm h-20">
      <div class="max-w-container-max mx-auto px-margin-page flex items-center justify-between h-full">
        <a class="font-display-lg text-headline-md text-primary" href="./home.html">Curated Sanctuary</a>
        <nav class="hidden md:flex items-center gap-gutter font-body-md text-label-md">
          <a class="text-on-surface-variant hover:text-primary transition-colors p-2" href="./marketplace.html">Shop</a>
          <a class="text-on-surface-variant hover:text-primary transition-colors p-2" href="./sellerdashboard.html">Sell</a>
          <a class="text-primary font-bold border-b-2 border-primary pb-1 p-2" href="./messages.html">Messages</a>
        </nav>
        <div class="flex items-center gap-4">
          <a class="active:scale-95 transition-transform text-on-surface-variant hover:text-primary" href="./messages.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">chat</span>
          </a>
          <a class="active:scale-95 transition-transform text-on-surface-variant hover:text-primary" href="./profile.html">
            <span class="material-symbols-outlined">account_circle</span>
          </a>
        </div>
      </div>
    </header>
    <main class="pt-20 h-screen max-w-container-max mx-auto px-margin-page flex overflow-hidden">
      <aside class="w-80 md:w-96 flex flex-col border-r border-outline-variant/30 bg-surface-container-lowest/50">
        <div class="p-6 border-b border-outline-variant/30">
          <div class="font-headline-md text-headline-md">Inbox</div>
          <div class="mt-4 flex items-center gap-3 bg-surface-container-low px-4 py-3 rounded-full border border-outline-variant/20">
            <span class="material-symbols-outlined text-outline">search</span>
            <input class="bg-transparent border-none focus:ring-0 text-body-md w-full placeholder:text-outline/60" placeholder="Search conversations..." type="text" />
          </div>
        </div>
        <div class="flex-1 overflow-y-auto">
          <div class="p-6 text-on-surface-variant text-[12px]">
            Trang này đang hiển thị toàn bộ tin nhắn của bạn từ <span class="font-bold">/messages/me</span>.
            Để gửi tin: nhập <span class="font-bold">listing_id</span> và <span class="font-bold">receiver_id</span> ở khung bên phải.
          </div>
        </div>
      </aside>
      <section class="flex-1 flex flex-col bg-surface-container-lowest">
        <div class="p-6 border-b border-outline-variant/30 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center text-on-secondary font-bold">M</div>
            <div>
              <div class="font-headline-md text-headline-md">My Messages</div>
              <div class="text-on-surface-variant text-[12px]">/messages/me</div>
            </div>
          </div>
          <button class="p-2 rounded-full hover:bg-surface-container-low transition-all active:scale-95">
            <span class="material-symbols-outlined text-primary">more_vert</span>
          </button>
        </div>
        <div id="messages-status" style="display:none;"></div>
        <div id="messages-list" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 border-t border-outline-variant/30">
          <form class="grid grid-cols-1 md:grid-cols-7 gap-3 items-center" onsubmit="return false;">
            <input class="md:col-span-1 bg-surface-container-low border border-outline-variant/20 rounded-lg px-4 py-3 focus:ring-1 focus:ring-primary" id="msg-listing-id" placeholder="listing_id" type="number" />
            <input class="md:col-span-1 bg-surface-container-low border border-outline-variant/20 rounded-lg px-4 py-3 focus:ring-1 focus:ring-primary" id="msg-receiver-id" placeholder="receiver_id" type="text" />
            <input class="md:col-span-4 bg-surface-container-low border border-outline-variant/20 rounded-lg px-4 py-3 focus:ring-1 focus:ring-primary" id="msg-body" placeholder="Write a message..." type="text" />
            <button class="md:col-span-1 bg-primary text-on-primary px-4 py-3 rounded-lg font-label-md hover:opacity-90 transition-all" id="msg-send" type="button">
              Send
            </button>
          </form>
        </div>
      </section>
    </main>
    <script type="module" src="../assets/js/pages/messages.js"></script>
  </body>
</html>
