<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../assets/js/theme.js"></script>
    <link rel="stylesheet" href="../assets/css/theme.css" />
    <link rel="stylesheet" href="../assets/css/pages.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
  </head>
  <body class="font-body-md text-body-md">
    <header class="bg-surface/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-outline-variant/30 shadow-sm">
      <div class="max-w-container-max mx-auto px-margin-page flex items-center justify-between h-20">
        <div class="flex items-center gap-stack-lg">
          <a class="font-display-lg text-headline-md text-primary" href="./home.html">Curated Sanctuary</a>
          <nav class="hidden md:flex gap-gutter items-center ml-stack-lg">
            <a class="font-body-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="./home.html">Collections</a>
            <a class="font-body-md text-label-md text-primary font-bold border-b-2 border-primary pb-1" href="./marketplace.html">Shop</a>
            <a class="font-body-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="./sellerdashboard.html">Sell</a>
            <a class="font-body-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="./messages.html">Community</a>
          </nav>
        </div>
        <div class="flex items-center gap-gutter">
          <div class="hidden lg:flex items-center bg-surface-container-low px-4 py-2 rounded-full border border-outline-variant/20">
            <span class="material-symbols-outlined text-outline">search</span>
            <input class="bg-transparent border-none focus:ring-0 text-body-md ml-2 w-64 placeholder:text-outline/60" placeholder="Search by title, author, or ISBN..." type="text" />
          </div>
          <div class="flex items-center gap-stack-md">
            <a class="active:scale-95 transition-transform hover:bg-surface-container-low p-2 rounded-full" href="./messages.html"><span class="material-symbols-outlined text-primary">chat</span></a>
            <a class="active:scale-95 transition-transform hover:bg-surface-container-low p-2 rounded-full" href="#"><span class="material-symbols-outlined text-primary">shopping_cart</span></a>
            <a class="active:scale-95 transition-transform hover:bg-surface-container-low p-2 rounded-full" href="./profile.html"><span class="material-symbols-outlined text-primary">account_circle</span></a>
          </div>
        </div>
      </div>
    </header>
    <main class="pt-32 pb-stack-lg max-w-container-max mx-auto px-margin-page">
      <div class="flex flex-col md:flex-row gap-gutter">
        <aside class="w-full md:w-64 flex-shrink-0 space-y-stack-lg">
          <div>
            <h3 class="font-headline-md text-headline-md text-primary mb-stack-md">Filters</h3>
            <label class="font-label-md text-label-md uppercase tracking-wider text-outline mb-stack-sm block">Category</label>
            <select class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg px-4 py-3 focus:ring-1 focus:ring-primary">
              <option>All</option>
              <option>Fiction</option>
              <option>Business</option>
              <option>Science</option>
            </select>
          </div>
          <div class="bg-surface-container-lowest border border-outline-variant/20 rounded-xl p-6">
            <div class="font-headline-md text-headline-md">Reading List</div>
            <div class="mt-4 space-y-3">
              <div class="reading-list-divider pb-3">Modern Classics</div>
              <div class="reading-list-divider pb-3">Vietnamese Literature</div>
              <div class="pb-1">AI & Technology</div>
            </div>
          </div>
        </aside>
        <section class="flex-1">
          <div class="flex justify-between items-end mb-stack-md">
            <div>
              <h1 class="font-headline-lg text-headline-lg text-on-surface">Marketplace</h1>
              <p class="text-on-surface-variant mt-2">Browse listings from sellers.</p>
            </div>
            <a class="text-primary font-label-md hover:underline" href="./search.html">Advanced search</a>
          </div>
          <div id="marketplace-status" class="text-on-surface-variant text-[12px] mt-3">Loading...</div>
          <div id="marketplace-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-gutter mt-4"></div>
        </section>
      </div>
    </main>
    <script type="module" src="../assets/js/pages/marketplace.js"></script>
  </body>
</html>
