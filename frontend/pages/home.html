<!DOCTYPE html>
<html class="light" lang="en">
  <head>

    <script src="../assets/js/theme.js"></script>
    <link rel="stylesheet" href="../assets/css/theme.css" />

  <body class="bg-background text-on-background font-body-md antialiased">
    <header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 shadow-sm">
      <div class="max-w-container-max mx-auto px-margin-page flex items-center justify-between h-20">
        <a class="font-display-lg text-headline-md text-primary" href="./home.html">Curated Sanctuary</a>
        <nav class="hidden md:flex items-center gap-6 font-body-md text-label-md">
          <a class="text-primary font-bold border-b-2 border-primary pb-1" href="./home.html">Home</a>
          <a class="text-on-surface-variant hover:text-primary transition-colors" href="./marketplace.html">Marketplace</a>
          <a class="text-on-surface-variant hover:text-primary transition-colors" href="./sellerdashboard.html">Sell</a>

            <a class="bg-primary text-on-primary px-8 py-4 rounded-lg font-label-md hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-xl shadow-primary/10" href="./marketplace.html">

            <a class="px-4 py-3 rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-all" href="./profile.html">Profile</a>
